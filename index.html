<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lori for Suruchi</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
font-family:Georgia,serif;
background:linear-gradient(135deg,#ff9a9e,#fecfef);
color:white;
text-align:center;
}

.rain{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:1;
}

.drop{
position:absolute;
width:2px;
height:60px;
background:rgba(255,255,255,0.4);
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(120vh);}
}

.page{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
z-index:2;
}

.page.active{
display:flex;
}

h1{
font-size:1.9rem;
margin-bottom:35px;
}

.btn{
background:rgba(255,255,255,0.25);
border:2px solid rgba(255,255,255,0.6);
color:white;
padding:14px 36px;
font-size:1.1rem;
border-radius:50px;
cursor:pointer;
}

.videos-container{
display:flex;
gap:40px;
flex-wrap:wrap;
justify-content:center;
}

.heart-card{
width:150px;
height:150px;
position:relative;
cursor:pointer;
}

.heart-card video{
width:100%;
height:100%;
object-fit:cover;
border-radius:16px;
display:none;
}

.heart-shape{
position:absolute;
inset:0;
background:rgba(255,182,193,0.4);
clip-path:polygon(50% 0%,100% 30%,90% 90%,50% 100%,10% 90%,0% 30%);
}

.label{
position:absolute;
bottom:-25px;
left:50%;
transform:translateX(-50%);
font-size:0.9rem;
}
</style>
</head>

<body>

<div class="rain" id="rain"></div>

<div id="intro" class="page active">
<h1>hi suruchi 😊<br>aapko neend nahi aa rahi,<br>koi na... aap lori suno 🥰</h1>
<button class="btn" onclick="goToVideos()">next</button>
</div>

<div id="videosPage" class="page">
<h1>tap on a heart to listen lori</h1>

<div class="videos-container">

<div class="heart-card" onclick="playThis(1)">
<div class="heart-shape"></div>
<video id="v1" src="video1.mp4" loop playsinline></video>
<div class="label">lori 1</div>
</div>

<div class="heart-card" onclick="playThis(2)">
<div class="heart-shape"></div>
<video id="v2" src="video2.mp4" loop playsinline></video>
<div class="label">lori 2</div>
</div>

</div>
</div>

<script>

const introPage=document.getElementById("intro")
const videosPage=document.getElementById("videosPage")
let activeVideo=null

function goToVideos(){

introPage.classList.remove("active")
videosPage.classList.add("active")

startRain()

}

function playThis(num){

if(activeVideo && activeVideo!==num){

let prev=document.getElementById("v"+activeVideo)
prev.pause()
prev.style.display="none"

}

let vid=document.getElementById("v"+num)

if(vid.style.display==="block"){

vid.pause()
vid.style.display="none"
activeVideo=null

}else{

vid.style.display="block"
vid.play()
activeVideo=num

}

}

function startRain(){

let rain=document.getElementById("rain")

for(let i=0;i<120;i++){

let d=document.createElement("div")
d.className="drop"
d.style.left=Math.random()*100+"%"
d.style.animationDuration=(0.5+Math.random())+"s"

rain.appendChild(d)

}

}

</script>

</body>
</html>
