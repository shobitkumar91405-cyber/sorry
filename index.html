<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Night Arpita 💖</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Dancing+Script:wght@700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: #ffffff; /* White background */
            height: 100vh;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Floating Balloons with Text */
        .balloon {
            position: absolute;
            width: 110px;
            height: 130px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 0.75rem;
            font-weight: bold;
            color: white;
            padding: 8px;
            box-sizing: border-box;
            animation: floatUp 9s linear infinite;
            z-index: 5;
            box-shadow: inset -8px -8px 15px rgba(0,0,0,0.1);
        }

        .balloon::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            width: 2px;
            height: 40px;
            background: rgba(0,0,0,0.15);
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg); }
            100% { transform: translateY(-25vh) rotate(15deg); }
        }

        .container {
            text-align: center;
            z-index: 10;
            background: rgba(255, 255, 255, 0.9);
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.2rem;
            color: #ff3366;
            margin-bottom: 10px;
        }

        /* Scratch Card Styling */
        .scratch-container {
            margin: 25px auto;
            width: 320px;
            height: 190px;
            position: relative;
            user-select: none;
            touch-action: none;
        }

        #scratch-canvas {
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
            z-index: 2;
            border-radius: 15px;
        }

        .inner-content {
            width: 100%;
            height: 100%;
            background: #eef7ff;
            border: 2px dashed #0099ff;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            color: #0055ff; /* Blue text color */
            font-weight: 600;
            font-size: 1.15rem;
            line-height: 1.5;
        }

        .gn-bold {
            font-size: 1.9rem;
            color: #0033aa;
            display: block;
            margin: 8px 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .footer {
            color: #ff4d88;
            font-size: 0.95rem;
            margin-top: 10px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Arpita &amp; Sivasingh 💖</h1>
        
        <div class="scratch-container">
            <div class="inner-content">
                <div>
                    Abhi soye nahi 🤨?<br>
                    Chalo achhe bachho ki tarah<br>
                    nini karo jaldi se... 💤<br>
                    <span class="gn-bold">Aur mujhe Good Night bhejo 💖</span>
                    Sirf Gn nhi🤨 Kal jo missing tha vo bhi... 😁<br>
                    heart emoji and 🤭🤭🤭🤭! ❤️
                </div>
            </div>
            <canvas id="scratch-canvas" width="320" height="190"></canvas>
        </div>

        <div class="footer">
            Card ko scratch karke dekho ✨
        </div>
    </div>

    <script>
        // 1. Colorful Balloons Logic
        const colors = ['#ff4d6d', '#00b4d8', '#ffb703', '#70e000', '#9d4edd', '#fb6f92'];
        
        function createBalloon() {
            const balloon = document.createElement('div');
            balloon.className = 'balloon';
            balloon.innerText = "Arpita Sivasingh";
            
            const color = colors[Math.floor(Math.random() * colors.length)];
            balloon.style.backgroundColor = color;
            balloon.style.left = Math.random() * 85 + 'vw';
            balloon.style.animationDuration = (Math.random() * 4 + 8) + 's';
            
            document.body.appendChild(balloon);
            setTimeout(() => balloon.remove(), 12000);
        }

        // Initial burst and continuous flow
        for(let i=0; i<5; i++) setTimeout(createBalloon, i*500);
        setInterval(createBalloon, 1800);

        // 2. Scratch Card Logic
        const canvas = document.getElementById('scratch-canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;

        // Fill with scratchable silver layer
        ctx.fillStyle = '#d1d1d1'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Pattern on silver layer
        ctx.fillStyle = '#888';
        ctx.font = 'bold 18px Poppins';
        ctx.textAlign = 'center';
        ctx.fillText('Yahan scratch karo 💖', canvas.width/2, canvas.height/2 + 5);

        function scratch(e) {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
            const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;

            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, 25, 0, Math.PI * 2);
            ctx.fill();
        }

        canvas.addEventListener('mousedown', () => isDrawing = true);
        canvas.addEventListener('touchstart', (e) => { isDrawing = true; e.preventDefault(); });
        window.addEventListener('mouseup', () => isDrawing = false);
        window.addEventListener('touchend', () => isDrawing = false);
        canvas.addEventListener('mousemove', scratch);
        canvas.addEventListener('touchmove', (e) => { scratch(e); e.preventDefault(); });

    </script>
</body>
</html>
